# /etc/pf.conf — HomeLlamaHub Mac mini hub
#
# Load: sudo pfctl -ef /etc/pf.conf
# Reload rules only: sudo pfctl -f /etc/pf.conf
# Check status: sudo pfctl -s all
# Show blocklist: sudo pfctl -t blocklist -T show
#
# Design:
#   - Default deny inbound from Internet
#   - Allow 443/TCP (HTTPS) from anywhere — Caddy handles auth/rate-limit
#   - Allow 22/TCP only from LAN for SSH maintenance
#   - blocklist table populated by auditor.py at runtime
#   - Connection rate limit overflows into blocklist automatically

# ── Network interface ──────────────────────────────────────────────────────────
# Adjust if the primary interface is not en0 (check: ifconfig -a)
ext_if = "en0"

# LAN subnet (FRITZ!Box default)
lan_net = "192.168.178.0/24"

# ── Tables ─────────────────────────────────────────────────────────────────────
# blocklist: IPs banned by auditor.py. Persisted across reloads.
table <blocklist> persist file "/etc/pf.blocklist"

# whitelist: Admin/trusted IPs that are never blocked. Edit whitelist.yml and
# run the load-whitelist.sh helper to sync this file.
table <whitelist> persist file "/etc/pf.whitelist"

# ── Default policy ─────────────────────────────────────────────────────────────
set skip on lo0
block all

# ── Whitelist bypass (must come before blocklist drop) ─────────────────────────
pass quick from <whitelist>

# ── Block banned IPs ──────────────────────────────────────────────────────────
block quick from <blocklist>

# ── Loopback ──────────────────────────────────────────────────────────────────
pass quick on lo0 all

# ── SSH: LAN only ─────────────────────────────────────────────────────────────
pass in quick on $ext_if proto tcp from $lan_net to any port 22 \
    flags S/SA keep state

# ── HTTPS: Internet-facing, with connection-rate overload ─────────────────────
# max-src-conn: max simultaneous connections per source IP
# max-src-conn-rate: max new connections per 10 seconds per source IP
# overload: IPs that exceed the rate go directly into <blocklist>
pass in quick on $ext_if proto tcp to any port 443 \
    flags S/SA keep state \
    (max-src-conn 30, max-src-conn-rate 100/10, \
     overload <blocklist> flush global)

# ── WOL (UDP): only from LAN ──────────────────────────────────────────────────
pass in quick on $ext_if proto udp from $lan_net to any port 9

# ── Allow all outbound ────────────────────────────────────────────────────────
pass out quick all keep state
